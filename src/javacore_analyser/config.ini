[javacore_processing]
# Skip generating detailed information page for javacores which have meaninfless stacktrace
skip_boring = True

# File names separator when you have multiple input files
separator = ;

[web_application]
# Debug mode for web application. Use only if you are debugging application on your workstation
debug = False

# Port to use web application
port = 8000

# Directory to store the reports
reports_dir = reports

[ai]
# Flag whether use ai functions
use_ai=False
# There are three LLM methods: Ollama server, HuggingFace (local, no server required), or WatsonX (remote)
#llm_method = ollama
# LLM model to use. For available models see https://ollama.com/library
#llm = ibm/granite4:latest
llm_method=huggingface
# List of available models: https://huggingface.co/collections/ibm-granite/granite-40-language-models
llm=ibm-granite/granite-4.0-micro
# WatsonX configuration (only needed when llm_method=watsonx)
#llm_method=watsonx
#llm=ibm/granite-4-h-small
#watsonx_api_key=your_api_key_here
#watsonx_project_id=your_project_id_here
#watsonx_url=https://us-south.ml.cloud.ibm.com

# Common LLM options
llm_max_tokens = default
llm_temperature = default


[plugins]
# Enable custom plugin system to extend javacore-analyser with additional data sources
# Plugins are loaded from ~/.javacore_analyser/plugins/ by default
enable_plugins = false

# Optional: Override default plugin directory
# Default: ~/.javacore_analyser/plugins
# plugin_directory = /custom/path/to/plugins
